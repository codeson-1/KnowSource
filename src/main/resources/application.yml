spring:
  application:
    name: KnowSource
  datasource:
    url: ${KNOWSOURCE_DATASOURCE_URL:jdbc:postgresql://localhost:15432/knowsource}
    username: ${KNOWSOURCE_DATASOURCE_USERNAME:knowsource}
    password: ${KNOWSOURCE_DATASOURCE_PASSWORD:knowsource}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${KNOWSOURCE_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${KNOWSOURCE_MULTIPART_MAX_REQUEST_SIZE:55MB}
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  ai:
    openai:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      base-url: ${AI_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      image:
        enabled: false
      moderation:
        enabled: false
      chat:
        options:
          model: ${AI_DASHSCOPE_CHAT_MODEL:qwen-plus}
      embedding:
        options:
          model: ${AI_DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

server:
  port: ${SERVER_PORT:8080}

knowsource:
  security:
    jwt:
      secret: ${KNOWSOURCE_JWT_SECRET:dev-only-change-me-dev-only-change-me}
      access-token-ttl-seconds: ${KNOWSOURCE_JWT_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-days: ${KNOWSOURCE_REFRESH_TOKEN_TTL_DAYS:7}
  storage:
    type: ${KNOWSOURCE_STORAGE_TYPE:local}
    local:
      root: ${KNOWSOURCE_STORAGE_LOCAL_ROOT:./data/sources}
    oss:
      endpoint: ${KNOWSOURCE_STORAGE_OSS_ENDPOINT:}
      bucket: ${KNOWSOURCE_STORAGE_OSS_BUCKET:}
      access-key-id: ${KNOWSOURCE_STORAGE_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${KNOWSOURCE_STORAGE_OSS_ACCESS_KEY_SECRET:}
      key-prefix: ${KNOWSOURCE_STORAGE_OSS_KEY_PREFIX:knowsource/sources}
      timeout-seconds: ${KNOWSOURCE_STORAGE_OSS_TIMEOUT_SECONDS:30}
  ingest:
    max-file-size-bytes: ${KNOWSOURCE_INGEST_MAX_FILE_SIZE_BYTES:52428800}
  async:
    ingest:
      core-pool-size: ${KNOWSOURCE_INGEST_EXECUTOR_CORE_POOL_SIZE:2}
      max-pool-size: ${KNOWSOURCE_INGEST_EXECUTOR_MAX_POOL_SIZE:4}
      queue-capacity: ${KNOWSOURCE_INGEST_EXECUTOR_QUEUE_CAPACITY:100}
    index:
      core-pool-size: ${KNOWSOURCE_INDEX_EXECUTOR_CORE_POOL_SIZE:1}
      max-pool-size: ${KNOWSOURCE_INDEX_EXECUTOR_MAX_POOL_SIZE:2}
      queue-capacity: ${KNOWSOURCE_INDEX_EXECUTOR_QUEUE_CAPACITY:100}
    chat:
      core-pool-size: ${KNOWSOURCE_CHAT_EXECUTOR_CORE_POOL_SIZE:4}
      max-pool-size: ${KNOWSOURCE_CHAT_EXECUTOR_MAX_POOL_SIZE:8}
      queue-capacity: ${KNOWSOURCE_CHAT_EXECUTOR_QUEUE_CAPACITY:200}
    trace:
      core-pool-size: ${KNOWSOURCE_TRACE_EXECUTOR_CORE_POOL_SIZE:1}
      max-pool-size: ${KNOWSOURCE_TRACE_EXECUTOR_MAX_POOL_SIZE:2}
      queue-capacity: ${KNOWSOURCE_TRACE_EXECUTOR_QUEUE_CAPACITY:200}
  spike:
    enabled: ${KNOWSOURCE_SPIKE_ENABLED:false}
  retrieval:
    max-distance: ${KNOWSOURCE_RETRIEVAL_MAX_DISTANCE:0.8}
    candidate-top-k: ${KNOWSOURCE_RETRIEVAL_CANDIDATE_TOP_K:15}
  modular-rag:
    compression-query:
      enabled: ${KNOWSOURCE_COMPRESSION_QUERY_ENABLED:true}
    multi-query:
      enabled: ${KNOWSOURCE_MULTI_QUERY_ENABLED:true}
      count: ${KNOWSOURCE_MULTI_QUERY_COUNT:2}
  embedding:
    dashscope:
      enabled: ${KNOWSOURCE_EMBEDDING_DASHSCOPE_ENABLED:false}
      api-key: ${AI_DASHSCOPE_API_KEY:}
      endpoint: ${KNOWSOURCE_EMBEDDING_DASHSCOPE_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}
      model: ${KNOWSOURCE_EMBEDDING_DASHSCOPE_MODEL:text-embedding-v3}
  rerank:
    provider: ${KNOWSOURCE_RERANK_PROVIDER:dashscope}
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      endpoint: ${KNOWSOURCE_RERANK_DASHSCOPE_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1/rerank}
      model: ${KNOWSOURCE_RERANK_DASHSCOPE_MODEL:qwen3-rerank}
      instruct: ${KNOWSOURCE_RERANK_DASHSCOPE_INSTRUCT:}
      protocol: ${KNOWSOURCE_RERANK_DASHSCOPE_PROTOCOL:compatible}
  ai:
    http:
      connect-timeout-millis: ${KNOWSOURCE_AI_HTTP_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${KNOWSOURCE_AI_HTTP_READ_TIMEOUT_MILLIS:30000}
      stream-read-timeout-millis: ${KNOWSOURCE_AI_HTTP_STREAM_READ_TIMEOUT_MILLIS:60000}
    resilience:
      chat:
        limit-for-period: ${KNOWSOURCE_AI_CHAT_LIMIT_FOR_PERIOD:10}
        limit-refresh-period-seconds: ${KNOWSOURCE_AI_CHAT_LIMIT_REFRESH_PERIOD_SECONDS:1}
        permission-timeout-millis: ${KNOWSOURCE_AI_CHAT_PERMISSION_TIMEOUT_MILLIS:0}
        bulkhead:
          max-concurrent-calls: ${KNOWSOURCE_AI_CHAT_BULKHEAD_MAX_CONCURRENT_CALLS:10}
          max-wait-millis: ${KNOWSOURCE_AI_CHAT_BULKHEAD_MAX_WAIT_MILLIS:0}
      embedding:
        limit-for-period: ${KNOWSOURCE_AI_EMBEDDING_LIMIT_FOR_PERIOD:5}
        limit-refresh-period-seconds: ${KNOWSOURCE_AI_EMBEDDING_LIMIT_REFRESH_PERIOD_SECONDS:1}
        permission-timeout-millis: ${KNOWSOURCE_AI_EMBEDDING_PERMISSION_TIMEOUT_MILLIS:0}
        bulkhead:
          max-concurrent-calls: ${KNOWSOURCE_AI_EMBEDDING_BULKHEAD_MAX_CONCURRENT_CALLS:5}
          max-wait-millis: ${KNOWSOURCE_AI_EMBEDDING_BULKHEAD_MAX_WAIT_MILLIS:0}
        retry:
          max-attempts: ${KNOWSOURCE_AI_EMBEDDING_RETRY_MAX_ATTEMPTS:3}
          wait-millis: ${KNOWSOURCE_AI_EMBEDDING_RETRY_WAIT_MILLIS:500}
      rerank:
        limit-for-period: ${KNOWSOURCE_AI_RERANK_LIMIT_FOR_PERIOD:10}
        limit-refresh-period-seconds: ${KNOWSOURCE_AI_RERANK_LIMIT_REFRESH_PERIOD_SECONDS:1}
        permission-timeout-millis: ${KNOWSOURCE_AI_RERANK_PERMISSION_TIMEOUT_MILLIS:0}
        bulkhead:
          max-concurrent-calls: ${KNOWSOURCE_AI_RERANK_BULKHEAD_MAX_CONCURRENT_CALLS:10}
          max-wait-millis: ${KNOWSOURCE_AI_RERANK_BULKHEAD_MAX_WAIT_MILLIS:0}
  index:
    poller:
      enabled: ${KNOWSOURCE_INDEX_POLLER_ENABLED:true}
    embedding-batch-size: ${KNOWSOURCE_INDEX_EMBEDDING_BATCH_SIZE:16}
    retry:
      max-attempts: ${KNOWSOURCE_INDEX_RETRY_MAX_ATTEMPTS:5}
      initial-delay-seconds: ${KNOWSOURCE_INDEX_RETRY_INITIAL_DELAY_SECONDS:30}
      max-delay-seconds: ${KNOWSOURCE_INDEX_RETRY_MAX_DELAY_SECONDS:300}
    syncing-timeout-seconds: ${KNOWSOURCE_INDEX_SYNCING_TIMEOUT_SECONDS:1800}
